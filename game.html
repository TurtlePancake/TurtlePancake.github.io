<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alec Taylor | Emberfall: Nightswarm</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    body {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .game-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      margin-top: var(--nav-height);
    }

    .game-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.25rem 1.5rem;
      background: var(--bg-alt);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 0.75rem;
      flex-wrap: wrap;
      min-height: 32px;
    }

    .game-banner-left {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .game-title-badge {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      font-weight: 700;
      color: #ffb84a;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .game-title-badge span {
      color: #c98aab;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      font-weight: 400;
      margin-left: 0.3rem;
    }

    .game-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .game-tag {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      background: rgba(74, 193, 189, 0.1);
      color: #4ac1bd;
      border: 1px solid rgba(74, 193, 189, 0.25);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.62rem;
    }

    .game-controls-hint {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .game-controls-hint strong {
      color: var(--text);
    }

    .game-frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #0d0a14;
    }

    #game-iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Fullscreen button */
    .fullscreen-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.7rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
    }
    .fullscreen-btn:hover {
      border-color: #ffb84a;
      color: #ffb84a;
    }
  </style>
</head>
<body>

  <nav id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">AT<span class="accent">.</span></a>
      <ul class="nav-links" id="nav-links">
        <li><a href="about.html"      class="nav-link">About</a></li>
        <li><a href="experience.html" class="nav-link">Experience</a></li>
        <li><a href="projects.html"   class="nav-link">Projects</a></li>
        <li><a href="education.html"  class="nav-link">Education</a></li>
        <li><a href="skills.html"     class="nav-link">Skills</a></li>
        <li><a href="contact.html"    class="nav-link">Contact</a></li>
        <li><a href="game.html"       class="nav-link active">&#9658; Play</a></li>
      </ul>
      <a href="assets/resume.pdf" class="btn btn-outline btn-sm" target="_blank">Resume</a>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <div class="game-shell">

    <!-- Info banner -->
    <div class="game-banner">
      <div class="game-banner-left">
        <div class="game-title-badge">
          EMBERFALL<span>NIGHTSWARM</span>
        </div>
        <span class="game-tag">Game made with Claude</span>
        <span class="game-tag">Roguelite</span>
      </div>
      <div class="game-meta">
        <span class="game-controls-hint">
          <strong>WASD</strong> Move &nbsp;·&nbsp;
          <strong>Auto-fire</strong> &nbsp;·&nbsp;
          <strong>P</strong> Pause &nbsp;·&nbsp;
          <strong>[1][2][3]</strong> Level-up picks
        </span>
        <button class="fullscreen-btn" id="fsBtn" onclick="toggleFullscreen()">
          &#x26F6; Fullscreen
        </button>
      </div>
    </div>

    <!-- Game iframe -->
    <div class="game-frame-wrap" id="gameWrap">
      <iframe
        id="game-iframe"
        src="game/index.html"
        title="Emberfall: Nightswarm"
        allowfullscreen
      ></iframe>
    </div>

  </div>

  <script src="js/main.js"></script>
  <script>
    function toggleFullscreen() {
      const wrap = document.getElementById('gameWrap');
      if (!document.fullscreenElement) {
        wrap.requestFullscreen().catch(() => {});
        document.getElementById('fsBtn').textContent = '✕ Exit Fullscreen';
      } else {
        document.exitFullscreen();
        document.getElementById('fsBtn').innerHTML = '&#x26F6; Fullscreen';
      }
    }

    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        document.getElementById('fsBtn').innerHTML = '&#x26F6; Fullscreen';
      }
    });
  </script>
</body>
</html>
